name: Release Dry Run

on:
  pull_request:
    branches: [main]
    paths:
      - 'packages/**'
      - 'tools/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - '.nvmrc'
      - '.github/actions/**'
      - '.github/workflows/ci.yml'
      - '.github/workflows/release*.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-dry-run-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-dry-run:
    runs-on: ubuntu-latest

    steps:
      # Dry-run workflow contract:
      # - install dependencies
      # - build the publishable workspace packages
      # - run pnpm release:validate
      # - run pnpm publish --dry-run for each public package against npmjs
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # Release flows stay on Node 24 because publishing and dry-run verification
      # are coupled to the npm runtime we use for trusted publishing.
      - name: Setup pnpm
        uses: ./.github/actions/setup-pnpm
        with:
          node-version: '24'
          pnpm-version: '10.13.1'
          registry-url: 'https://registry.npmjs.org'

      - name: Show runtime versions
        run: |
          node -v
          npm -v
          pnpm -v

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure npmjs registry
        run: |
          cat > .npmrc.publish <<'EOF'
          registry=https://registry.npmjs.org/
          @open-agent-toolkit:registry=https://registry.npmjs.org/
          EOF

      - name: Build
        run: pnpm build

      - name: Release validate
        run: pnpm release:validate

      - name: Publish dry run
        env:
          NPM_CONFIG_USERCONFIG: ${{ github.workspace }}/.npmrc.publish
        run: |
          for pkg_name in \
            @open-agent-toolkit/docs-transforms \
            @open-agent-toolkit/docs-config \
            @open-agent-toolkit/docs-theme \
            @open-agent-toolkit/cli
          do
            pack_dir="$(mktemp -d)"
            pnpm --filter "$pkg_name" pack --pack-destination "$pack_dir"
            tarball="$(find "$pack_dir" -maxdepth 1 -name '*.tgz' -print -quit)"
            pkg_version="$(
              pnpm --filter "$pkg_name" exec node -e "process.stdout.write(require('./package.json').version)"
            )"

            if npm view "${pkg_name}@${pkg_version}" version >/dev/null 2>&1; then
              echo "Skipping npm publish --dry-run for ${pkg_name}@${pkg_version}; version already exists on npm."
            else
              npm publish --dry-run --access public "$tarball"
            fi

            rm -rf "$pack_dir"
          done
