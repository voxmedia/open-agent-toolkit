name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check
        run: pnpm check

      - name: Type check
        run: pnpm type-check

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Validate skill version bumps
        run: pnpm run cli -- internal validate-skill-version-bumps --base-ref origin/main

      - name: Release validate
        run: pnpm release:validate

      - name: Build docs
        run: pnpm build:docs

  tag-public-release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_tag: ${{ steps.create_release_tag.outputs.release_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create release tag for lockstep package bump
        id: create_release_tag
        run: >
          pnpm exec tsx tools/release/create-public-package-tag.ts
          --base-ref "${{ github.event.before }}"
          --head-ref "${{ github.sha }}"
          --push

  release-public-packages:
    if: needs.tag-public-release.outputs.release_tag != ''
    needs: tag-public-release
    permissions:
      contents: write
      id-token: write
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ needs.tag-public-release.outputs.release_tag }}
    secrets: inherit
