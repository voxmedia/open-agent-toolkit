name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      # Publish workflow contract:
      # - run only from release tags
      # - use npm trusted publishing via GitHub OIDC
      # - rerun the same build and release validation path as dry-run
      # - publish the four @tkstang/oat-* packages in lockstep
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      # Release flows stay on Node 24 because trusted publishing uses the npm
      # runtime from this job, not the repo's general development baseline.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Show runtime versions
        run: |
          node -v
          npm -v
          pnpm -v

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure npmjs registry
        run: |
          cat > .npmrc.publish <<'EOF'
          registry=https://registry.npmjs.org/
          @tkstang:registry=https://registry.npmjs.org/
          EOF

      - name: Build
        run: pnpm build

      - name: Release validate
        run: pnpm release:validate

      - name: Publish packages
        env:
          NPM_CONFIG_USERCONFIG: ${{ github.workspace }}/.npmrc.publish
        run: |
          for pkg_name in \
            @tkstang/oat-docs-transforms \
            @tkstang/oat-docs-config \
            @tkstang/oat-docs-theme \
            @tkstang/oat-cli
          do
            pack_dir="$(mktemp -d)"
            pnpm --filter "$pkg_name" pack --pack-destination "$pack_dir"
            tarball="$(find "$pack_dir" -maxdepth 1 -name '*.tgz' -print -quit)"
            npm publish --access public "$tarball"
            rm -rf "$pack_dir"
          done

  create-release:
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write

    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
