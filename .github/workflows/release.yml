name: Release

on:
  workflow_call:
    inputs:
      tag:
        description: 'Existing release tag to publish (for example: v0.0.14)'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to publish (for example: v0.0.14)'
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ inputs.tag }}

    steps:
      # Publish workflow contract:
      # - run only from release tags
      # - use npm trusted publishing via GitHub OIDC
      # - rerun the same build and release validation path as dry-run
      # - publish the four @open-agent-toolkit/* packages in lockstep
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_TAG }}

      # Release flows stay on Node 24 because trusted publishing uses the npm
      # runtime from this job, not the repo's general development baseline.
      - name: Setup pnpm
        uses: ./.github/actions/setup-pnpm
        with:
          node-version: '24'
          pnpm-version: '10.13.1'
          registry-url: 'https://registry.npmjs.org'

      - name: Show runtime versions
        run: |
          node -v
          npm -v
          pnpm -v

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure npmjs registry
        run: |
          cat > .npmrc.publish <<'EOF'
          registry=https://registry.npmjs.org/
          @open-agent-toolkit:registry=https://registry.npmjs.org/
          EOF

      - name: Build
        run: pnpm build

      - name: Release validate
        run: pnpm release:validate

      - name: Publish packages
        env:
          NPM_CONFIG_USERCONFIG: ${{ github.workspace }}/.npmrc.publish
        run: |
          for pkg_name in \
            @open-agent-toolkit/docs-transforms \
            @open-agent-toolkit/docs-config \
            @open-agent-toolkit/docs-theme \
            @open-agent-toolkit/cli
          do
            pack_dir="$(mktemp -d)"
            pnpm --filter "$pkg_name" pack --pack-destination "$pack_dir"
            tarball="$(find "$pack_dir" -maxdepth 1 -name '*.tgz' -print -quit)"
            npm publish --access public "$tarball"
            rm -rf "$pack_dir"
          done

  create-release:
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ inputs.tag }}

    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Release ${{ env.RELEASE_TAG }}
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## Packages

            This release publishes the current lockstep version of the public
            `@open-agent-toolkit/*` packages:

            - `@open-agent-toolkit/cli`
            - `@open-agent-toolkit/docs-config`
            - `@open-agent-toolkit/docs-theme`
            - `@open-agent-toolkit/docs-transforms`

            ## Installation

            ```bash
            npm install -g @open-agent-toolkit/cli
            ```

            ## Full Changelog

            See below for auto-generated release notes.
